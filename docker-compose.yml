# Rebuild from scratch:
# docker compose down
# docker compose build --no-cache
# docker compose up -d

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: bookagency_backend
    env_file:
      - .env
    expose:
      - "8003"
    ports: 
      - "8003:8003"
    networks:
      - bookagency_network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - ANGULAR_API_URI=${ANGULAR_API_URI}
        - ANGULAR_TEST_API_URI=${ANGULAR_TEST_API_URI}
        - ANGULAR_FIREBASE_API_KEY=${ANGULAR_FIREBASE_API_KEY}
        - ANGULAR_FIREBASE_AUTH_DOMAIN=${ANGULAR_FIREBASE_AUTH_DOMAIN}
        - ANGULAR_FIREBASE_PROJECT_ID=${ANGULAR_FIREBASE_PROJECT_ID}
        - ANGULAR_FIREBASE_STORAGE_BUCKET=${ANGULAR_FIREBASE_STORAGE_BUCKET}
        - ANGULAR_FIREBASE_MESSAGING_SENDER_ID=${ANGULAR_FIREBASE_MESSAGING_SENDER_ID}
        - ANGULAR_FIREBASE_APP_ID=${ANGULAR_FIREBASE_APP_ID}
        - ANGULAR_FIREBASE_LOCATION_ID=${ANGULAR_FIREBASE_LOCATION_ID}
        - ANGULAR_CLOUDINARY_CLOUD_NAME=${ANGULAR_CLOUDINARY_CLOUD_NAME}
        - ANGULAR_CLOUDINARY_UPLOAD_PRESET=${ANGULAR_CLOUDINARY_UPLOAD_PRESET}
        - ANGULAR_CLOUDINARY_BASE_URL=${ANGULAR_CLOUDINARY_BASE_URL}
    container_name: bookagency_frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - bookagency_network
    restart: unless-stopped

networks:
  bookagency_network:
    driver: bridge
